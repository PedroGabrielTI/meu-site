<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Mercado - Autoatendimento</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #1976d2;
      --ok: #0f766e;
      --danger: #b91c1c;
      --border: rgba(15, 23, 42, 0.12);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
      --radius: 14px;
      --radius-sm: 10px;
      --space: 16px;
      --space-sm: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--text);
      background: var(--bg);
    }
    header {
      background: linear-gradient(90deg, var(--brand), #1e88e5);
      color: #fff;
      padding: 16px 22px;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 2px 14px rgba(0,0,0,.15);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .container { padding: 18px; max-width: 1320px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 420px; gap: 16px; align-items: start; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .panel h2 { margin: 0; padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 16px; }
    .panel-body { padding: 16px; }
    .searchbar { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 14px; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; outline: none; background: #fff; font-size: 14px; }
    input[type="text"]:focus { border-color: rgba(25,118,210,.6); box-shadow: 0 0 0 4px rgba(25,118,210,.12); }
    button { border: 0; border-radius: 10px; padding: 12px 14px; font-weight: 700; cursor: pointer; background: var(--brand); color: #fff; transition: transform .05s ease; }
    button:active { transform: translateY(1px); }
    button.secondary { background: #e2e8f0; color: #0f172a; }
    button.success { background: var(--ok); }
    button.danger { background: var(--danger); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .product { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; display: grid; grid-template-rows: 140px auto; background: #fff; }
    .product .img { background: #eef2f7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .product .img img { width: 100%; height: 140px; object-fit: cover; }
    .product .img .placeholder { color: var(--muted); font-weight: 700; font-size: 12px; padding: 10px; text-align: center; }
    .product .info { padding: 12px; display: grid; gap: 8px; }
    .product .title { font-weight: 800; font-size: 14px; line-height: 1.2; min-height: 34px; }
    .meta { color: var(--muted); font-size: 12px; display: grid; gap: 4px; }
    .price { font-weight: 900; color: #0a7a29; font-size: 16px; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; background: rgba(15,23,42,0.06); border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .cart-empty { color: var(--muted); font-size: 14px; padding: 4px 0 10px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 10px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    th { color: var(--muted); font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .qty-controls { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .qty-controls button { padding: 8px 10px; border-radius: 0; background: #e2e8f0; color: #0f172a; font-weight: 900; }
    .qty-controls span { display: inline-flex; align-items: center; justify-content: center; width: 36px; font-weight: 900; background: #fff; }
    .total { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 16px; font-weight: 900; }
    .actions { margin-top: 12px; display: grid; gap: 10px; }
    .hint { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .toast { position: fixed; right: 16px; bottom: 16px; background: #0f172a; color: #fff; padding: 12px 14px; border-radius: 12px; box-shadow: var(--shadow); opacity: 0; transform: translateY(10px); transition: opacity .2s ease, transform .2s ease; max-width: min(520px, calc(100vw - 32px)); z-index: 999; font-size: 13px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(15,23,42,0.25); padding: 28px 24px; width: min(420px, calc(100vw - 32px)); display: grid; gap: 16px; }
    .modal h3 { margin: 0; font-size: 18px; font-weight: 900; }
    .modal .modal-total { font-size: 28px; font-weight: 900; color: #0a7a29; text-align: center; padding: 8px 0; }
    .modal .pay-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pay-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 18px 12px; border-radius: var(--radius); border: 2px solid var(--border); background: #f8fafc; color: var(--text); font-size: 15px; font-weight: 800; cursor: pointer; transition: border-color .15s, background .15s; }
    .pay-btn:hover { border-color: var(--brand); background: #eff6ff; }
    .pay-btn .icon { font-size: 32px; }
    .modal-cancel { background: #e2e8f0; color: #0f172a; width: 100%; padding: 12px; font-size: 14px; }
    .modal-success { text-align: center; display: grid; gap: 12px; }

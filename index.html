<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light">
  <title>Mercado Penharol</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #f5c800;
      --ok: #1a1a1a;
      --danger: #b91c1c;
      --border: rgba(15, 23, 42, 0.12);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
      --radius: 14px;
      --radius-sm: 10px;
      --space: 16px;
      --space-sm: 10px;
    }
    * { box-sizing: border-box; }

    html, body {
      background: #ffffff !important;
      color-scheme: light !important;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: #ffffff;
    }
    header {
      background: linear-gradient(135deg, #111111 0%, #f5c800 50%, #111111 100%);
      color: #ffffff;
      min-height: 140px;
      padding: 16px 22px 14px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
      box-shadow: 0 4px 18px rgba(0,0,0,.22);
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 4px solid #f5c800;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }
    .container {
      padding: 18px;
      max-width: 1320px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .panel h2 {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 16px;
    }
    .panel-body {
      padding: 16px;
    }
    .searchbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: #fff;
      font-size: 14px;
    }
    input[type="text"]:focus {
      border-color: rgba(25,118,210,.6);
      box-shadow: 0 0 0 4px rgba(25,118,210,.12);
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
      transition: transform .05s ease, filter .15s ease;
    }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    button.success {
      background: #1a1a1a;
      color: #f5c800;
    }
    button.danger {
      background: var(--danger);
    }
    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .product {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: grid;
      grid-template-rows: 140px auto;
      background: #fff;
    }
    .product .img {
      background: #eef2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product .img img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      padding: 10px;
      background: #fff;
    }
    .product .img .placeholder {
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      padding: 10px;
      text-align: center;
    }
    .product .info {
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .product .title {
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      min-height: 34px;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      display: grid;
      gap: 4px;
    }
    .price {
      font-weight: 900;
      color: #0a7a29;
      font-size: 16px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .cart-empty {
      color: var(--muted);
      font-size: 14px;
      padding: 4px 0 10px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 6px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .qty-controls {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .qty-controls button {
      padding: 8px 10px;
      border-radius: 0;
      background: #e2e8f0;
      color: #0f172a;
      font-weight: 900;
    }
    .qty-controls span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      font-weight: 900;
      background: #fff;
    }
    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 16px;
      font-weight: 900;
    }
    .actions {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }
    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: #0f172a;
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      max-width: min(520px, calc(100vw - 32px));
      z-index: 999;
      font-size: 13px;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(15,23,42,0.25); padding: 28px 24px; width: min(420px, calc(100vw - 32px)); display: grid; gap: 16px; }
    .modal h3 { margin: 0; font-size: 18px; font-weight: 900; }
    .modal-total { font-size: 28px; font-weight: 900; color: #0a7a29; text-align: center; padding: 8px 0; }
    .pay-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .pay-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 18px 12px; border-radius: var(--radius); border: 2px solid var(--border); background: #f8fafc; color: var(--text); font-size: 15px; font-weight: 800; cursor: pointer; transition: border-color .15s, background .15s; }
    .pay-btn:hover { border-color: var(--brand); background: #eff6ff; }
    .pay-btn .icon { font-size: 32px; }
    .modal-cancel { background: #e2e8f0; color: #0f172a; width: 100%; padding: 12px; font-size: 14px; }
    .modal-success { text-align: center; display: grid; gap: 12px; }
    .modal-success .big-icon { font-size: 56px; }
    .modal-success h3 { font-size: 20px; font-weight: 900; margin: 0; }
    .modal-success p { margin: 0; color: var(--muted); font-size: 14px; }
    .forma-tag { display: inline-block; background: #dcfce7; color: #15803d; border-radius: 999px; padding: 4px 14px; font-weight: 700; font-size: 13px; }

    /* Popup do carrinho */
    .cart-popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.55); z-index: 300;
      align-items: flex-end; justify-content: center;
    }
    .cart-popup-overlay.open { display: flex; }
    .cart-popup {
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 40px rgba(15,23,42,0.18);
      width: min(640px, 100vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: slideUpCart .22s ease;
    }
    @keyframes slideUpCart { from { transform: translateY(60px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .cart-popup-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 17px; font-weight: 900;
    }
    .cart-popup-close {
      background: #e2e8f0; color: #0f172a;
      border-radius: 999px; padding: 6px 14px;
      font-size: 13px; font-weight: 700;
    }
    .cart-popup-body {
      overflow-y: auto; padding: 14px 20px; flex: 1;
    }
    .cart-popup-footer {
      padding: 14px 20px 20px;
      border-top: 1px solid var(--border);
      display: grid; gap: 10px;
    }
    .cart-popup-total {
      display: flex; justify-content: space-between;
      font-size: 18px; font-weight: 900; margin-bottom: 4px;
    }

    /* Card de confirmação do produto escaneado */
    .product-confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.55); z-index: 200;
      align-items: center; justify-content: center;
      animation: fadeInBg .15s ease;
    }
    .product-confirm-overlay.open { display: flex; }
    @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }

    .product-confirm-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 24px 64px rgba(15,23,42,0.28);
      width: min(400px, calc(100vw - 32px));
      overflow: hidden; animation: slideUp .18s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    .product-confirm-img {
      width: 100%; height: 200px;
      display: flex; align-items: center; justify-content: center;
      background: #eef2f7; overflow: hidden;
    }
    .product-confirm-img img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      padding: 10px;
      background: #fff;
    }
    .product-confirm-img .no-img {
      color: var(--muted); font-size: 13px; font-weight: 700;
    }
    .product-confirm-body { padding: 22px 22px 18px; display: grid; gap: 14px; }
    .product-confirm-name { font-size: 20px; font-weight: 900; line-height: 1.2; color: var(--text); }
    .product-confirm-price { font-size: 38px; font-weight: 900; color: #0a7a29; letter-spacing: -.5px; }
    .product-confirm-meta { font-size: 13px; color: var(--muted); }
    .product-confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .product-confirm-actions button { padding: 14px; font-size: 15px; border-radius: 12px; }
    .btn-confirm-add { background: #1a1a1a !important; color: #fff !important; font-size: 16px !important; }
    .btn-confirm-cancel { background: #e2e8f0 !important; color: #0f172a !important; }
  

    html {
      background: #ffffff !important;
    }

    body {
      background: #ffffff !important;
      color-scheme: light !important;
    }

    .panel,
    .product,
    .product .img,
    .product .info,
    .panel-body,
    .container {
      background: #ffffff !important;
    }

  </style>
</head>
<body>
  <header>Mercado Penharol</header>

  <div class="container">
    <div class="grid">
      <section class="panel">
        <h2>Produtos</h2>
        <div class="panel-body">
          <div class="searchbar">
            <div id="scannerStatus" style="
              display: flex;
              align-items: center;
              gap: 10px;
              padding: 12px 14px;
              border: 1px solid var(--border);
              border-radius: 10px;
              background: #fff;
              font-size: 14px;
              color: var(--muted);
              flex: 1;
            ">
              <span id="scannerDot" style="
                width: 10px; height: 10px;
                border-radius: 50%;
                background: #22c55e;
                flex-shrink: 0;
                box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
                animation: pulse 2s infinite;
              "></span>
              <span id="scannerLabel">Scanner ativo — escaneie um produto</span>
            </div>
            <button id="btnBuscar" style="display:none;">OK</button>
          </div>
          <style>
            @keyframes pulse {
              0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
              50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.05); }
            }
            @keyframes scanFlash {
              0% { background: rgba(148,4,118,0.08); }
              100% { background: transparent; }
            }
          

    html {
      background: #ffffff !important;
    }

    body {
      background: #ffffff !important;
      color-scheme: light !important;
    }

    .panel,
    .product,
    .product .img,
    .product .info,
    .panel-body,
    .container {
      background: #ffffff !important;
    }

  </style>

          <div id="products" class="products-grid"></div>
        </div>
      </section>

      <aside class="panel">
        <h2>Carrinho</h2>
        <div class="panel-body">
          <div id="cartEmpty" class="cart-empty">Carrinho vazio.</div>
          <div id="cartWrap" style="display:none;">
            <table>
              <thead>
                <tr>
                  <th>Produto</th>
                  <th style="width:120px;">Qtd</th>
                  <th style="width:120px;">Preço</th>
                  <th style="width:44px;"></th>
                </tr>
              </thead>
              <tbody id="cartBody"></tbody>
            </table>

            <div class="total">
              <span>Total:</span>
              <span id="cartTotal">R$ 0,00</span>
            </div>

            <div class="actions">
              <button id="btnFinalizar" class="success">Finalizar compra</button>
              <button id="btnLimpar" class="secondary">Limpar carrinho</button>
            </div>

          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Botão flutuante do carrinho -->
  <div id="cartFab" style="
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 250;
    background: #f5c800;
    color: #111;
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,200,0,0.45);
    display: flex;
    align-items: center;
    gap: 10px;
  " onclick="openCartPopup()">
    🛒 <span id="cartFabLabel">Ver Carrinho</span>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Popup do carrinho -->
  <div id="cartPopupOverlay" class="cart-popup-overlay">
    <div class="cart-popup">
      <div class="cart-popup-header">
        <span>🛒 Carrinho</span>
        <button class="cart-popup-close" id="btnFecharCartPopup">✖ Fechar</button>
      </div>
      <div class="cart-popup-body" id="cartPopupBody"></div>
      <div class="cart-popup-footer">
        <div class="cart-popup-total">
          <span>Total:</span>
          <span id="cartPopupTotal">R$ 0,00</span>
        </div>
        <button class="success" id="btnFinalizarPopup" style="padding:14px;font-size:16px;">Finalizar compra</button>
        <button class="secondary" id="btnLimparPopup" style="padding:12px;font-size:14px;">Limpar carrinho</button>
      </div>
    </div>
  </div>

  <!-- Overlay de confirmação do produto escaneado -->
  <div id="productConfirmOverlay" class="product-confirm-overlay">
    <div class="product-confirm-card" id="productConfirmCard"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- Supabase JS (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  
  <script>
    // =====================================================================================
    // CONFIG (frontend)
    // =====================================================================================
    const SUPABASE_URL = 'https://yrpuzchhayagnlipxcaj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycHV6Y2hoYXlhZ25saXB4Y2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxOTYyOTgsImV4cCI6MjA4MDc3MjI5OH0.cIWXfKth6mVRTdrCBLG733SxfFGIRw3vozz3RvxyYW0';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const API_MP_CREATE = '/api/mp-point-create';
    const API_MP_CREATE_DEBIT = '/api/mp-point-create-debit';
    const API_MP_STATUS = '/api/mp-point-status';
    const API_MP_CANCEL = '/api/mp-point-cancel';

    // =====================================================================================
    // HELPERS
    // =====================================================================================
    const moneyBR = (v) => (v ?? 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function toast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
    }

    function normalizeBarcode(s) {
      return String(s ?? '').trim();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function sanitizeErrorMessage(err, fallback) {
      const msg = err?.message || err?.error || fallback || 'Erro inesperado.';
      return String(msg).trim() || fallback || 'Erro inesperado.';
    }

    function isTerminalSuccessState(state) {
      // "finished" NÃO está aqui pois o MP usa para aprovados E recusados
      // O sucesso real é verificado pelo payment.state dentro da resposta
      const value = String(state || '').toLowerCase();
      return ['approved', 'processed', 'done', 'successful', 'success'].includes(value);
    }

    function isTerminalFailureState(state) {
      const value = String(state || '').toLowerCase();
      return ['canceled', 'cancelled', 'failed', 'rejected', 'error', 'abandoned', 'expired',
              'refunded', 'timeout', 'timed_out', 'time_out', 'on_terminal_timeout',
              'terminal_timeout', 'payment_timeout', 'aborted'].includes(value);
    }

    // Verifica resultado real quando state="finished" (pode ser aprovado ou recusado)
    function resolveFinishedState(status) {
      // O MP retorna payment.state com o resultado real dentro de "finished"
      const paymentState = String(status?.payment?.state || '').toLowerCase();
      const paymentId = status?.payment?.id;

      console.log('[resolveFinishedState] payment.state=' + paymentState + ' payment.id=' + paymentId);

      if (['approved', 'approved_funder', 'partially_refunded'].includes(paymentState)) {
        return 'success';
      }
      if (['rejected', 'cancelled', 'refunded', 'charged_back', 'in_mediation'].includes(paymentState)) {
        return 'failure';
      }
      console.warn('[resolveFinishedState] state vazio paymentId=', paymentId);
      return 'failure';
    }

    function toIsoNow() {
      return new Date().toISOString();
    }

    async function postJSON(url, payload) {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {})
      });
      let data = null;
      try { data = await resp.json(); } catch (_) {}
      if (!resp.ok) throw new Error(data?.error || data?.message || `Falha em ${url}`);
      return data;
    }

    async function getJSON(url) {
      const resp = await fetch(url, { method: 'GET' });
      let data = null;
      try { data = await resp.json(); } catch (_) {}
      if (!resp.ok) throw new Error(data?.error || data?.message || `Falha em ${url}`);
      return data;
    }

    // =====================================================================================
    // STATE
    // =====================================================================================
    let products = [];
    const cart = new Map();
    let checkoutBusy = false;
    let currentIntent = null;

    // =====================================================================================
    // LOAD PRODUCTS
    // =====================================================================================
    async function loadProducts() {
      const el = document.getElementById('products');
      el.innerHTML = '';

      let data, error;
      ({ data, error } = await supabaseClient
        .from('produtos')
        .select('id,nome,codigo_barras,preco,estoque,imagem_url,ativo')
        .eq('ativo', true)
        .order('id', { ascending: true }));

      if (error && String(error.message || '').toLowerCase().includes('column')) {
        ({ data, error } = await supabaseClient
          .from('produtos')
          .select('id,nome,codigo_barras,preco,estoque')
          .order('id', { ascending: true }));
      }

      if (error) {
        console.error('Erro carregando produtos:', error);
        toast('Erro ao carregar produtos. Veja o Console (F12).');
        el.innerHTML = "<div style='color:#b91c1c;font-weight:700;'>Erro ao carregar produtos.</div>";
        return;
      }

      products = (data || []).map(p => ({
        ...p,
        codigo_barras: normalizeBarcode(p.codigo_barras),
        preco: Number(p.preco || 0),
        estoque: Number(p.estoque || 0),
      }));

      if (!products.length) {
        el.innerHTML = "<div style='color:#64748b;'>Nenhum produto cadastrado.</div>";
        return;
      }

      renderProducts();
    }

    function renderProducts() {
      const el = document.getElementById('products');
      el.innerHTML = '';

      for (const p of products) {
        const card = document.createElement('div');
        card.className = 'product';

        const imgWrap = document.createElement('div');
        imgWrap.className = 'img';
        if (p.imagem_url) {
          const img = document.createElement('img');
          img.src = p.imagem_url;
          img.alt = p.nome;
          img.loading = 'lazy';
          img.onerror = () => { imgWrap.innerHTML = "<div class='placeholder'>Sem imagem</div>"; };
          imgWrap.appendChild(img);
        } else {
          imgWrap.innerHTML = "<div class='placeholder'>Sem imagem</div>";
        }

        const info = document.createElement('div');
        info.className = 'info';

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = p.nome;

        const price = document.createElement('div');
        price.className = 'price';
        price.textContent = moneyBR(p.preco);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `
          <div>Cód. barras: <b>${p.codigo_barras || '-'}</b></div>
          <div>Estoque: <b>${p.estoque}</b></div>
        `;

        const row = document.createElement('div');
        row.className = 'row';

        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = p.estoque > 0 ? 'Disponível' : 'Sem estoque';

        const btn = document.createElement('button');
        btn.className = 'success';
        btn.textContent = 'Adicionar';
        btn.disabled = p.estoque <= 0;
        btn.onclick = () => {
          addToCart(p.id, 1);
          renderCart();
          openCartPopup();
        };

        row.appendChild(chip);
        row.appendChild(btn);
        info.appendChild(title);
        info.appendChild(price);
        info.appendChild(meta);
        info.appendChild(row);
        card.appendChild(imgWrap);
        card.appendChild(info);
        el.appendChild(card);
      }
    }

    // =====================================================================================
    // CART
    // =====================================================================================
    function addToCart(productId, qty) {
      const p = products.find(x => x.id === productId);
      if (!p) return toast('Produto não encontrado.');
      if (p.estoque <= 0) return toast('Sem estoque.');

      const current = cart.get(productId);
      const newQty = Math.min((current?.qty || 0) + qty, p.estoque);
      if (newQty <= 0) cart.delete(productId);
      else cart.set(productId, { product: p, qty: newQty });
      renderCart();
    }

    function setCartQty(productId, qty) {
      const item = cart.get(productId);
      if (!item) return;
      const max = item.product.estoque;
      const clamped = Math.max(0, Math.min(qty, max));
      if (clamped === 0) cart.delete(productId);
      else cart.set(productId, { ...item, qty: clamped });
      renderCart();
    }

    function clearCart() {
      cart.clear();
      renderCart();
    }

    function calcTotal() {
      let total = 0;
      for (const { product, qty } of cart.values()) total += (Number(product.preco) || 0) * qty;
      return total;
    }

    function getCartItemsSnapshot() {
      return Array.from(cart.values()).map(({ product, qty }) => ({
        produto_id: product.id,
        nome: product.nome,
        codigo_barras: product.codigo_barras,
        preco: Number(product.preco) || 0,
        quantidade: qty,
        subtotal: (Number(product.preco) || 0) * qty
      }));
    }

    function updateCartFab() {
      const fab = document.getElementById('cartFab');
      const label = document.getElementById('cartFabLabel');
      if (!fab) return;
      if (cart.size === 0) {
        fab.style.display = 'none';
      } else {
        fab.style.display = 'flex';
        const total = calcTotal();
        const qtd = Array.from(cart.values()).reduce((s, i) => s + i.qty, 0);
        label.textContent = qtd + ' item' + (qtd > 1 ? 's' : '') + ' — ' + moneyBR(total);
      }
    }

    function renderCart() {
      const empty = document.getElementById('cartEmpty');
      const wrap = document.getElementById('cartWrap');
      const body = document.getElementById('cartBody');
      const totalEl = document.getElementById('cartTotal');

      if (cart.size === 0) {
        empty.style.display = 'block';
        wrap.style.display = 'none';
        body.innerHTML = '';
        totalEl.textContent = moneyBR(0);
        return;
      }

      empty.style.display = 'none';
      wrap.style.display = 'block';
      body.innerHTML = '';

      for (const [id, item] of cart.entries()) {
        const tr = document.createElement('tr');

        const tdName = document.createElement('td');
        tdName.innerHTML = `<b>${item.product.nome}</b><br><span style="color:#64748b;font-size:12px;">${item.product.codigo_barras || ''}</span>`;

        const tdQty = document.createElement('td');
        const qtyBox = document.createElement('div');
        qtyBox.className = 'qty-controls';

        const minus = document.createElement('button');
        minus.type = 'button';
        minus.tabIndex = -1;
        minus.textContent = '-';
        minus.onclick = (e) => { e.preventDefault(); setCartQty(id, item.qty - 1); };

        const span = document.createElement('span');
        span.textContent = String(item.qty);

        const plus = document.createElement('button');
        plus.type = 'button';
        plus.tabIndex = -1;
        plus.textContent = '+';
        plus.onclick = (e) => { e.preventDefault(); setCartQty(id, item.qty + 1); };

        qtyBox.appendChild(minus);
        qtyBox.appendChild(span);
        qtyBox.appendChild(plus);
        tdQty.appendChild(qtyBox);

        const tdPrice = document.createElement('td');
        tdPrice.textContent = moneyBR((Number(item.product.preco) || 0) * item.qty);

        const tdRm = document.createElement('td');
        const rm = document.createElement('button');
        rm.type = 'button';
        rm.tabIndex = -1;
        rm.className = 'danger';
        rm.textContent = 'X';
        rm.style.padding = '8px 10px';
        rm.onclick = (e) => { e.preventDefault(); setCartQty(id, 0); };
        tdRm.appendChild(rm);

        tr.appendChild(tdName);
        tr.appendChild(tdQty);
        tr.appendChild(tdPrice);
        tr.appendChild(tdRm);
        body.appendChild(tr);
      }

      totalEl.textContent = moneyBR(calcTotal());
      updateCartFab();
    }

    function showWaitingForTerminal(vendaId, total, intentId) {
      openModal(`
        <div class="modal-success">
          <div class="big-icon">💳</div>
          <h3>Aguardando maquininha</h3>
          <p>Venda <b>#${vendaId}</b> criada como pendente.</p>
          <p>Valor enviado: <b>${moneyBR(total)}</b></p>
          <p style="font-size:12px;color:var(--muted);">Intent ID: <b>${intentId}</b></p>
          <p>Aproxime, insira ou passe o cartão na Point.</p>
          <button class="secondary" id="btnVerificarAgora" style="width:100%;padding:12px;">Verificar agora</button>
          <button class="danger" id="btnCancelarIntent" style="width:100%;padding:12px;">Cancelar cobrança</button>
        </div>
      `);
      document.getElementById('btnVerificarAgora').onclick = async () => {
        if (!currentIntent) return;
        try { await checkIntentStatus(currentIntent, true); } catch (e) { toast(sanitizeErrorMessage(e, 'Falha ao consultar a maquininha.')); }
      };
      document.getElementById('btnCancelarIntent').onclick = async () => {
        if (!currentIntent) return;
        const btn = document.getElementById('btnCancelarIntent');
        if (btn) { btn.disabled = true; btn.textContent = 'Cancelando...'; }

        try {
          // 1) Consulta status atual rapidamente
          let statusAtual = null;
          try {
            statusAtual = await getJSON(`${API_MP_STATUS}?payment_intent_id=${encodeURIComponent(currentIntent.intentId)}`);
          } catch (_) {}

          const state = String(statusAtual?.state || '').toLowerCase();

          // 2) "finished" — verifica payment.state para saber se aprovado ou recusado
          if (state === 'finished') {
            const result = resolveFinishedState(statusAtual);
            const saved = { ...currentIntent };
            currentIntent.active = false;
            currentIntent = null;
            checkoutBusy = false;
            if (result === 'success') {
              await commitVenda(saved.vendaId, saved.formaLabel || 'maquininha_fisica', saved.items);
              clearCart();
              await loadProducts();
              showSuccess(saved.vendaId, saved.formaLabel || 'maquininha_fisica', 'Pagamento já aprovado na maquininha.');
            } else {
              await markVendaCancelled(saved.vendaId, saved.intentId, 'recusado_maquininha');
              closeModal();
              toast('Pagamento recusado na maquininha. Cobrança encerrada.');
            }
            return;
          }

          // 3) Já aprovado — commita e encerra
          if (isTerminalSuccessState(state)) {
            const saved = { ...currentIntent };
            currentIntent.active = false;
            currentIntent = null;
            checkoutBusy = false;
            await commitVenda(saved.vendaId, saved.formaLabel || 'maquininha_fisica', saved.items);
            clearCart();
            await loadProducts();
            showSuccess(saved.vendaId, 'maquininha_fisica', 'Pagamento já aprovado na maquininha.');
            return;
          }

          // 4) Já cancelado/recusado — apenas libera
          if (isTerminalFailureState(state)) {
            const saved = { ...currentIntent };
            currentIntent.active = false;
            currentIntent = null;
            checkoutBusy = false;
            await markVendaCancelled(saved.vendaId, saved.intentId, state || 'cancelado');
            closeModal();
            toast('Cobrança já estava encerrada na maquininha.');
            return;
          }

          // 4) Tenta cancelar UMA vez na API
          try {
            await postJSON(API_MP_CANCEL, { payment_intent_id: currentIntent.intentId });
            // Cancelamento aceito — libera tudo
            const saved = { ...currentIntent };
            currentIntent.active = false;
            currentIntent = null;
            checkoutBusy = false;
            await markVendaCancelled(saved.vendaId, saved.intentId, 'cancelado_no_pdv');
            closeModal();
            toast('Cobrança cancelada.');
          } catch (cancelErr) {
            const msg = String(cancelErr?.message || '').toLowerCase();
            if (msg.includes('conflict') || msg.includes('being processed') || msg.includes('already')) {
              // Maquininha está processando — deixa o polling resolver e avisa
              // NÃO trava o sistema: polling continua rodando e vai detectar o resultado
              if (btn) { btn.disabled = false; btn.textContent = 'Cancelar cobrança'; }
              toast('A maquininha está processando o pagamento. O resultado aparecerá automaticamente.');
              // Mostra mensagem mais clara no modal
              openModal(`
                <div class="modal-success">
                  <div class="big-icon">⏳</div>
                  <h3>Aguardando resultado</h3>
                  <p>A maquininha está processando o cartão.</p>
                  <p>O sistema vai atualizar automaticamente quando terminar.</p>
                  <button class="secondary" id="btnVerificarAgora2" style="width:100%;padding:12px;">Verificar agora</button>
                </div>
              `);
              document.getElementById('btnVerificarAgora2').onclick = async () => {
                if (!currentIntent) return;
                try { await checkIntentStatus(currentIntent, true); } catch (e) { toast(sanitizeErrorMessage(e, 'Falha ao consultar.')); }
              };
            } else {
              throw cancelErr;
            }
          }
        } catch (e) {
          console.error(e);
          if (btn) { btn.disabled = false; btn.textContent = 'Cancelar cobrança'; }
          toast(sanitizeErrorMessage(e, 'Não foi possível cancelar. Tente novamente.'));
        }
      };
    }

    // =====================================================================================
    // DATABASE HELPERS (compatível com schema atual e com colunas novas, se existirem)
    // =====================================================================================
    async function tryVendaUpdate(vendaId, payload) {
      const { error } = await supabaseClient.from('vendas').update(payload).eq('id', vendaId);
      if (error) throw error;
    }

    // Mapeia status_pagamento → status (nome real da coluna no banco)
    function normalizePayload(payload) {
      const p = { ...payload };
      // Mapeia status_pagamento -> status (nome real da coluna)
      if ('status_pagamento' in p) { p.status = p.status_pagamento; delete p.status_pagamento; }
      // Remove colunas que não existem no banco
      delete p.mp_payment_intent_id;
      delete p.observacao_pagamento;
      delete p.atualizado_em;
      return p;
    }

    async function updateVendaCompat(vendaId, payload) {
      const normalized = normalizePayload(payload);
      if (!normalized || !Object.keys(normalized).length) return false;
      const { error } = await supabaseClient
        .from('vendas')
        .update(normalized)
        .eq('id', vendaId);
      if (error) {
        console.warn('[updateVendaCompat] erro:', error?.message || error);
        return false;
      }
      return true;
    }

    async function createPendingVenda(items, total, formaPagamento) {
      // Monta payload apenas com colunas que existem na tabela
      const produtosJson = items.map(i => ({
        produto_id: i.produto_id,
        nome: i.nome,
        quantidade: i.quantidade,
        preco: i.preco,
        subtotal: i.subtotal
      }));

      const payload = {
        produtos: produtosJson,
        valor_total: total,
        forma_pagamento: formaPagamento,
        status: 'pending'
      };

      console.log('[createPendingVenda] inserindo:', JSON.stringify(payload));
      const { data, error } = await supabaseClient
        .from('vendas')
        .insert(payload)
        .select('id')
        .single();

      if (error) {
        console.error('[createPendingVenda] ERRO SUPABASE:', JSON.stringify(error));
        toast('Erro Supabase: ' + (error.message || error.code || JSON.stringify(error)));
        throw new Error('Erro: ' + (error.message || error.code));
      }
      if (!data?.id) {
        toast('Erro: venda sem ID.');
        throw new Error('Venda sem ID.');
      }
      console.log('[createPendingVenda] OK id=', data.id);
      return data;
    }

    async function insertItensVenda(vendaId, items) {
      // Guarda de duplicidade
      const { data: existing } = await supabaseClient
        .from('itens_venda')
        .select('id')
        .eq('venda_id', vendaId)
        .limit(1);

      if (existing && existing.length > 0) {
        console.warn('[insertItensVenda] itens já existem para venda #' + vendaId);
        return;
      }

      const payload = items.map(item => ({
        venda_id: vendaId,
        produto_id: item.produto_id,
        quantidade: item.quantidade,
        preco_unitario: item.preco,
        custo_unitario: 0,
        total: item.subtotal
      }));

      const { error } = await supabaseClient.from('itens_venda').insert(payload);
      if (error) {
        console.error('[insertItensVenda] erro:', error);
        toast('Erro ao salvar itens: ' + (error.message || JSON.stringify(error)));
        throw error;
      }
    }

    async function baixarEstoqueFromItems(items) {
      for (const item of items) {
        const prod = products.find(p => p.id === item.produto_id);
        const estoqueAtual = Number(prod?.estoque || 0);
        const novoEstoque = Math.max(0, estoqueAtual - Number(item.quantidade || 0));
        const { error } = await supabaseClient
          .from('produtos')
          .update({ estoque: novoEstoque })
          .eq('id', item.produto_id);
        if (error) console.warn('Erro estoque:', error?.message);
      }
    }

    async function commitVenda(vendaId, formaPagamento, items, extras = {}) {
      try {
        await insertItensVenda(vendaId, items);
      } catch(e) {
        console.error('[commitVenda] falha insertItensVenda:', e);
      }
      await baixarEstoqueFromItems(items);

      const updatePayload = { forma_pagamento: formaPagamento, status: 'approved' };
      if (extras.mp_payment_intent_id) {
        updatePayload.order_nsu = String(extras.mp_payment_intent_id).slice(0, 255);
      }

      console.log('[commitVenda] update vendaId=', vendaId, JSON.stringify(updatePayload));
      const { error } = await supabaseClient
        .from('vendas')
        .update(updatePayload)
        .eq('id', vendaId);
      if (error) {
        console.error('[commitVenda] ERRO:', JSON.stringify(error));
        toast('Erro ao finalizar: ' + (error.message || error.code || JSON.stringify(error)));
      } else {
        console.log('[commitVenda] OK vendaId=', vendaId, 'approved');
      }
    }

    async function markVendaCancelled(vendaId, intentId, reason) {
      const { error } = await supabaseClient
        .from('vendas')
        .update({ status: 'cancelled', forma_pagamento: 'cancelada' })
        .eq('id', vendaId);
      if (error) console.warn('[markVendaCancelled] erro:', error?.message || JSON.stringify(error));
    }

    // =====================================================================================
    // CHECKOUT
    // =====================================================================================
    async function finalizarVenda(formaPagamento, paymentType = null) {
      if (checkoutBusy) return toast('Já existe um pagamento em andamento.');
      if (!cart.size) return toast('Carrinho vazio.');

      checkoutBusy = true;
      const items = getCartItemsSnapshot();
      const total = calcTotal();

      try {
        if (formaPagamento === 'pix') {
          openModal(`<div style="text-align:center;padding:30px;font-size:15px;color:var(--muted);">⏳ Gerando QR Code PIX...</div>`);
          const venda = await createPendingVenda(items, total, 'pix');

          let pixData = null;
          try {
            pixData = await postJSON('/api/mp-pix-create', {
              venda_id: venda.id,
              amount: total,
              description: `Venda #${venda.id} - Mini Mercado`
            });
          } catch (pixErr) {
            // Falha ao gerar PIX — cancela a venda e libera
            try { await updateVendaCompat(venda.id, { forma_pagamento: 'pix_cancelado', status_pagamento: 'cancelled' }); } catch (_) {}
            checkoutBusy = false;
            closeModal();
            toast(sanitizeErrorMessage(pixErr, 'Erro ao gerar QR Code PIX. Tente novamente.'));
            return;
          }

          if (!pixData?.qr_code_base64) {
            // QR não veio — cancela a venda, não aprova nada
            try { await updateVendaCompat(venda.id, { forma_pagamento: 'pix_cancelado', status_pagamento: 'cancelled' }); } catch (_) {}
            checkoutBusy = false;
            closeModal();
            toast('Não foi possível gerar o QR Code PIX. Tente novamente ou use a maquininha.');
            return;
          }

          const pixPaymentId = pixData.id;

          openModal(`
            <div class="modal-success">
              <div class="big-icon">📱</div>
              <h3>Pague via PIX</h3>
              <p>Venda <b>#${venda.id}</b> — <b>${moneyBR(total)}</b></p>
              <img src="data:image/png;base64,${pixData.qr_code_base64}" style="width:190px;height:190px;margin:0 auto;display:block;border-radius:8px;" alt="QR Code PIX"/>
              <p style="font-size:11px;color:var(--muted);word-break:break-all;max-height:48px;overflow:hidden;">${pixData.qr_code || ''}</p>
              <button class="success" id="btnPixVerificar" style="width:100%;padding:14px;">🔍 Verificar pagamento</button>
              <button class="secondary" id="btnPixCancelar" style="width:100%;padding:12px;">Cancelar</button>
            </div>
          `);

          // Polling do status do PIX
          let pixPollingActive = true;
          const pixPollingLoop = async () => {
            while (pixPollingActive) {
              await sleep(4000);
              if (!pixPollingActive) break;
              try {
                const statusResp = await getJSON(`/api/mp-pix-status?payment_id=${encodeURIComponent(pixPaymentId)}`);
                const pixState = String(statusResp?.status || '').toLowerCase();
                if (pixState === 'approved') {
                  pixPollingActive = false;
                  await commitVenda(venda.id, 'pix', items);
                  clearCart();
                  await loadProducts();
                  checkoutBusy = false;
                  showSuccess(venda.id, 'pix', 'PIX aprovado automaticamente!');
                  return;
                }
                if (['cancelled', 'rejected', 'refunded', 'charged_back', 'expired'].includes(pixState)) {
                  pixPollingActive = false;
                  await updateVendaCompat(venda.id, { forma_pagamento: 'pix_cancelado', status_pagamento: 'cancelled' });
                  checkoutBusy = false;
                  closeModal();
                  toast('PIX expirado ou cancelado.');
                  return;
                }
              } catch (_) {}
            }
          };
          pixPollingLoop();

          document.getElementById('btnPixVerificar').onclick = async () => {
            const btnV = document.getElementById('btnPixVerificar');
            if (btnV) { btnV.disabled = true; btnV.textContent = 'Verificando...'; }
            try {
              const statusResp = await getJSON(`/api/mp-pix-status?payment_id=${encodeURIComponent(pixPaymentId)}`);
              const pixState = String(statusResp?.status || '').toLowerCase();
              if (pixState === 'approved') {
                pixPollingActive = false;
                await commitVenda(venda.id, 'pix', items);
                clearCart();
                await loadProducts();
                checkoutBusy = false;
                showSuccess(venda.id, 'pix', 'PIX aprovado!');
              } else {
                toast(`Status PIX: ${pixState || 'aguardando pagamento'}`);
                if (btnV) { btnV.disabled = false; btnV.textContent = '🔍 Verificar pagamento'; }
              }
            } catch (e) {
              toast('Erro ao verificar. Tente novamente.');
              if (btnV) { btnV.disabled = false; btnV.textContent = '🔍 Verificar pagamento'; }
            }
          };

          document.getElementById('btnPixCancelar').onclick = async () => {
            pixPollingActive = false;
            const btnC = document.getElementById('btnPixCancelar');
            if (btnC) { btnC.disabled = true; btnC.textContent = 'Cancelando...'; }
            // Cancela o pagamento PIX no Mercado Pago também.
            // ATENÇÃO: se a chamada falhar (ex: PIX já expirou, erro de rede), seguimos mesmo assim.
            // Isso significa que pode existir uma janela onde o PIX ainda está válido no MP
            // mas a venda já foi marcada como cancelada localmente. Aceitável porque o PIX
            // expira automaticamente em ~30min no MP sem cobrança ao cliente.
            try {
              await postJSON('/api/mp-pix-cancel', { payment_id: pixPaymentId });
            } catch (e) {
              console.warn('Aviso: não foi possível cancelar o PIX no MP:', e?.message);
              // Continua mesmo assim — o PIX expira sozinho em 30min no MP
            }
            await updateVendaCompat(venda.id, { forma_pagamento: 'pix_cancelado', status_pagamento: 'cancelled' });
            checkoutBusy = false;
            closeModal();
          };
          return;
        }

        openModal(`<div style="text-align:center;padding:30px;font-size:15px;color:var(--muted);">⏳ Criando venda pendente...</div>`);
        const formaLabel = paymentType === 'debit_card' ? 'maquininha_debito' : paymentType === 'credit_card' ? 'maquininha_credito' : 'maquininha_pendente';
        const venda = await createPendingVenda(items, total, formaLabel);

        openModal(`<div style="text-align:center;padding:30px;font-size:15px;color:var(--muted);">💳 Enviando cobrança para a maquininha...</div>`);

        let mp;
        try {
          const mpPayload = {
            venda_id: venda.id,
            amount: total,
            description: `Venda #${venda.id} - Mercado Penharol`,
            external_reference: String(venda.id)
          };
          const mpEndpoint = paymentType === 'debit_card' ? API_MP_CREATE_DEBIT : API_MP_CREATE;
          if (paymentType) mpPayload.payment_method_id = paymentType;
          mp = await postJSON(mpEndpoint, mpPayload);
        } catch (mpErr) {
          // Falha ao criar intent — cancela a venda pendente e libera
          try { await markVendaCancelled(venda.id, null, 'erro_criar_intent'); } catch (_) {}
          checkoutBusy = false;
          closeModal();
          toast(sanitizeErrorMessage(mpErr, 'Erro ao enviar para a maquininha. Tente novamente.'));
          return;
        }

        currentIntent = {
          active: true,
          vendaId: venda.id,
          intentId: mp.id,
          total,
          items,
          formaLabel
        };

        await updateVendaCompat(venda.id, {
          forma_pagamento: 'maquininha_pendente',
          status_pagamento: 'aguardando_maquininha',
          mp_payment_intent_id: mp.id,
          atualizado_em: toIsoNow()
        });

        showWaitingForTerminal(venda.id, total, mp.id);
        startIntentPolling();
      } catch (e) {
        console.error(e);
        closeModal();
        checkoutBusy = false;
        currentIntent = null;
        toast(sanitizeErrorMessage(e, 'Erro ao finalizar venda. Tente novamente.'));
      }
    }

    async function checkIntentStatus(intentCtx, manualCheck = false) {
      const status = await getJSON(`${API_MP_STATUS}?payment_intent_id=${encodeURIComponent(intentCtx.intentId)}`);
      const state = String(status?.state || '').toLowerCase();
      const detail = status?.status_detail || status?.payment?.status_detail || status?.detail || status?.message || state;

      console.log('[intent] state="' + state + '" payment.state="' + (status?.payment?.state || '') + '" detail="' + detail + '"');

      // "finished" = transação encerrada na maquininha, mas pode ser aprovada OU recusada
      // Precisa checar payment.state para saber o resultado real
      if (state === 'finished') {
        if (!intentCtx.active) return status;
        const result = resolveFinishedState(status);

        if (result === 'success') {
          intentCtx.active = false;
          await commitVenda(intentCtx.vendaId, intentCtx.formaLabel || 'maquininha_fisica', intentCtx.items, {
            status_pagamento: 'aprovado',
            mp_payment_intent_id: intentCtx.intentId,
          });
          clearCart();
          await loadProducts();
          checkoutBusy = false;
          showSuccess(intentCtx.vendaId, intentCtx.formaLabel || 'maquininha_fisica', 'Pagamento aprovado!');
          return status;
        } else {
          // Recusado/cancelado pela maquininha
          intentCtx.active = false;
          await markVendaCancelled(intentCtx.vendaId, intentCtx.intentId, 'recusado_maquininha');
          checkoutBusy = false;
          closeModal();
          const motivo = status?.payment?.state || detail || 'recusado';
          toast('Pagamento recusado na maquininha: ' + motivo + '. Tente outro cartão.');
          currentIntent = null;
          return status;
        }
      }

      if (isTerminalSuccessState(state)) {
        if (!intentCtx.active) return status;
        intentCtx.active = false;
        await commitVenda(intentCtx.vendaId, intentCtx.formaLabel || 'maquininha_fisica', intentCtx.items, {
          status_pagamento: 'aprovado',
          mp_payment_intent_id: intentCtx.intentId,
        });
        clearCart();
        await loadProducts();
        checkoutBusy = false;
        showSuccess(intentCtx.vendaId, intentCtx.formaLabel || 'maquininha_fisica', 'Pagamento aprovado!');
        return status;
      }

      if (isTerminalFailureState(state)) {
        if (!intentCtx.active) return status;
        intentCtx.active = false;
        await markVendaCancelled(intentCtx.vendaId, intentCtx.intentId, state || 'falhou');
        checkoutBusy = false;
        closeModal();
        toast('Pagamento não concluído na maquininha: ' + (detail || state));
        currentIntent = null;
        return status;
      }

      if (manualCheck) toast('Status atual da maquininha: ' + (detail || state || 'em processamento'));
      return status;
    }

    async function startIntentPolling() {
      const intentCtx = currentIntent;
      if (!intentCtx) return;

      const startedAt = Date.now();
      const timeoutMs = 3 * 60 * 1000; // 3 minutos — tempo real da maquininha

      while (intentCtx.active && Date.now() - startedAt < timeoutMs) {
        try {
          await checkIntentStatus(intentCtx, false);
        } catch (e) {
          console.warn('Falha ao consultar intent:', e?.message || e);
        }
        if (!intentCtx.active) break;
        await sleep(3000);
      }

      if (intentCtx.active) {
        intentCtx.active = false;
        try { await postJSON(API_MP_CANCEL, { payment_intent_id: intentCtx.intentId }); } catch (_) {}
        try { await markVendaCancelled(intentCtx.vendaId, intentCtx.intentId, 'timeout_consulta'); } catch (_) {}
        checkoutBusy = false;
        closeModal();
        toast('Tempo de espera esgotado. Tente novamente.');
      }
      currentIntent = null;
    }

    // =====================================================================================
    // LEITOR DE CÓDIGO DE BARRAS — ESCUTA GLOBAL (sem precisar clicar no campo)
    // =====================================================================================
    //
    // Como funciona:
    //  - Captura TODOS os keydown da página (escuta global)
    //  - Scanners de código de barras digitam muito rápido (< 50ms entre teclas)
    //  - Digitação humana é lenta (> 50ms entre teclas)
    //  - Ao detectar o Enter do scanner, processa o código acumulado
    //  - Se detectar digitação lenta (humano), ignora o buffer para não processar parciais
    // =====================================================================================

    let barcodeBuffer = '';
    let barcodeLastTime = 0;
    const SCANNER_SPEED_THRESHOLD = 80; // ms — abaixo disso = scanner, acima = humano

    function setScannerReady() {
      const dot = document.getElementById('scannerDot');
      const label = document.getElementById('scannerLabel');
      if (dot) {
        dot.style.background = '#22c55e';
        dot.style.animation = 'pulse 2s infinite';
      }
      if (label) label.textContent = 'Scanner ativo — escaneie um produto';
    }

    function setScannerReading(partial) {
      const dot = document.getElementById('scannerDot');
      const label = document.getElementById('scannerLabel');
      if (dot) {
        dot.style.background = '#f59e0b';
        dot.style.animation = 'none';
      }
      if (label) label.textContent = `Lendo: ${partial}`;
    }

    function flashPanel() {
      const panel = document.querySelector('.panel');
      if (panel) {
        panel.style.animation = 'none';
        panel.style.transition = 'background 0.3s';
        panel.style.background = 'rgba(148,4,118,0.06)';
        setTimeout(() => { panel.style.background = ''; }, 300);
      }
    }

    // =====================================================================================
    // CARD DE CONFIRMAÇÃO DO PRODUTO
    // =====================================================================================
    function openProductConfirm(product) {
      const overlay = document.getElementById('productConfirmOverlay');
      const card = document.getElementById('productConfirmCard');

      const imgHtml = product.imagem_url
        ? `<div class="product-confirm-img"><img src="${product.imagem_url}" alt="${product.nome}" onerror="this.parentElement.innerHTML='<div class=\"no-img\">Sem imagem</div>'"/></div>`
        : `<div class="product-confirm-img"><div class="no-img">Sem imagem</div></div>`;

      card.innerHTML = `
        ${imgHtml}
        <div class="product-confirm-body">
          <div class="product-confirm-name">${product.nome}</div>
          <div class="product-confirm-price">${moneyBR(product.preco)}</div>
          <div class="product-confirm-meta">Cód. barras: <b>${product.codigo_barras || '-'}</b> &nbsp;|&nbsp; Estoque: <b>${product.estoque}</b></div>
          <div class="product-confirm-actions">
            <button class="btn-confirm-add" id="btnConfirmAdd">✅ Adicionar</button>
            <button class="btn-confirm-cancel" id="btnConfirmCancel">✖ Cancelar</button>
          </div>
        </div>
      `;

      overlay.classList.add('open');

      document.getElementById('btnConfirmAdd').onclick = () => {
        addToCart(product.id, 1);
        closeProductConfirm();
        renderCart();
        openCartPopup();
      };
      document.getElementById('btnConfirmCancel').onclick = () => {
        closeProductConfirm();
        setScannerReady();
      };
    }

    // =====================================================================================
    // POPUP DO CARRINHO
    // =====================================================================================
    function renderCartPopup() {
      const body = document.getElementById('cartPopupBody');
      const totalEl = document.getElementById('cartPopupTotal');
      body.innerHTML = '';

      if (cart.size === 0) {
        body.innerHTML = '<p style="color:var(--muted);font-size:14px;padding:8px 0;">Carrinho vazio.</p>';
        totalEl.textContent = moneyBR(0);
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>Produto</th><th style="width:120px;">Qtd</th><th style="width:110px;">Preço</th><th style="width:44px;"></th></tr></thead>';
      const tbody = document.createElement('tbody');

      for (const [id, item] of cart.entries()) {
        const tr = document.createElement('tr');

        const tdName = document.createElement('td');
        tdName.innerHTML = '<b>' + item.product.nome + '</b><br><span style="color:#64748b;font-size:12px;">' + (item.product.codigo_barras || '') + '</span>';

        const tdQty = document.createElement('td');
        const qtyBox = document.createElement('div');
        qtyBox.className = 'qty-controls';
        const minus = document.createElement('button');
        minus.type = 'button'; minus.tabIndex = -1; minus.textContent = '-';
        minus.onclick = () => { setCartQty(id, item.qty - 1); renderCartPopup(); renderCart(); };
        const span = document.createElement('span');
        span.textContent = String(item.qty);
        const plus = document.createElement('button');
        plus.type = 'button'; plus.tabIndex = -1; plus.textContent = '+';
        plus.onclick = () => { setCartQty(id, item.qty + 1); renderCartPopup(); renderCart(); };
        qtyBox.appendChild(minus); qtyBox.appendChild(span); qtyBox.appendChild(plus);
        tdQty.appendChild(qtyBox);

        const tdPrice = document.createElement('td');
        tdPrice.textContent = moneyBR((Number(item.product.preco) || 0) * item.qty);

        const tdRm = document.createElement('td');
        const rm = document.createElement('button');
        rm.type = 'button'; rm.tabIndex = -1; rm.className = 'danger';
        rm.textContent = 'X'; rm.style.padding = '8px 10px';
        rm.onclick = () => { setCartQty(id, 0); renderCartPopup(); renderCart(); };
        tdRm.appendChild(rm);

        tr.appendChild(tdName); tr.appendChild(tdQty);
        tr.appendChild(tdPrice); tr.appendChild(tdRm);
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      body.appendChild(table);
      totalEl.textContent = moneyBR(calcTotal());
    }

    function openCartPopup() {
      renderCartPopup();
      const overlay = document.getElementById('cartPopupOverlay');
      overlay.style.zIndex = '300';
      overlay.classList.add('open');
    }

    function closeCartPopup() {
      document.getElementById('cartPopupOverlay').classList.remove('open');
    }

    document.getElementById('cartPopupOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'cartPopupOverlay') closeCartPopup();
    });

    document.getElementById('btnFecharCartPopup').addEventListener('click', closeCartPopup);

    document.getElementById('btnFinalizarPopup').addEventListener('click', () => {
      closeCartPopup();
      abrirModalPagamento();
    });

    document.getElementById('btnLimparPopup').addEventListener('click', () => {
      clearCart();
      renderCartPopup();
      closeCartPopup();
    });

    function closeProductConfirm() {
      document.getElementById('productConfirmOverlay').classList.remove('open');
      setScannerReady();
    }

    // Fechar ao clicar fora do card
    document.getElementById('productConfirmOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'productConfirmOverlay') closeProductConfirm();
    });

    function processBarcode(code) {
      code = normalizeBarcode(code);
      if (!code) return;

      // Ignora se modal de pagamento ou confirmação já estiver aberto
      const modal = document.getElementById('modalOverlay');
      if (modal && modal.classList.contains('open')) return;
      const confirmOverlay = document.getElementById('productConfirmOverlay');
      if (confirmOverlay && confirmOverlay.classList.contains('open')) return;

      const p = products.find(x => normalizeBarcode(x.codigo_barras) === code);
      if (!p) {
        toast(`❌ Código não encontrado: ${code}`);
        setScannerReady();
      } else if (p.estoque <= 0) {
        toast(`❌ ${p.nome} sem estoque.`);
        setScannerReady();
      } else {
        openProductConfirm(p);
      }
    }

    document.addEventListener('keydown', (e) => {
      // Ignora se estiver num input de texto editável (ex: campos do modal)
      const tag = e.target.tagName.toLowerCase();
      const isEditable = (tag === 'input' && e.target.type !== 'hidden') ||
                         tag === 'textarea' ||
                         e.target.isContentEditable;

      // Só ignora se for um input que NÃO seja o nosso scanner display
      if (isEditable && e.target.id !== 'barcodeInput') return;

      // Escape fecha o card de confirmação
      if (e.key === 'Escape') { closeProductConfirm(); return; }

      // Ignora teclas de controle que não são caracteres do código
      if (e.key === 'Tab' || e.key === 'F1' ||
          e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' ||
          e.key === 'CapsLock' || e.key === 'Meta') return;

      const now = Date.now();
      const delta = now - barcodeLastTime;
      barcodeLastTime = now;

      // Reset buffer se ficou muito tempo parado (digitação humana lenta)
      if (delta > 500 && barcodeBuffer.length > 0) {
        barcodeBuffer = '';
      }

      if (e.key === 'Enter') {
        if (barcodeBuffer.length >= 3) {
          const code = barcodeBuffer;
          barcodeBuffer = '';
          processBarcode(code);
        } else {
          barcodeBuffer = '';
          setScannerReady();
        }
        return;
      }

      // Acumula apenas caracteres imprimíveis (código de barras = dígitos e letras)
      if (e.key.length === 1) {
        barcodeBuffer += e.key;
        setScannerReading(barcodeBuffer);

        // Timeout de segurança: se o scanner não enviar Enter, processa após 300ms
        clearTimeout(window._barcodeTimeout);
        window._barcodeTimeout = setTimeout(() => {
          if (barcodeBuffer.length >= 3) {
            const code = barcodeBuffer;
            barcodeBuffer = '';
            processBarcode(code);
          } else {
            barcodeBuffer = '';
            setScannerReady();
          }
        }, 300);
      }
    });

    // Compatibilidade: botão OK ainda funciona se alguém quiser usar manualmente
    document.getElementById('btnBuscar').addEventListener('click', () => {
      if (barcodeBuffer.length >= 3) {
        const code = barcodeBuffer;
        barcodeBuffer = '';
        processBarcode(code);
      }
    });
    document.getElementById('btnFinalizar').addEventListener('click', abrirModalPagamento);
    document.getElementById('btnLimpar').addEventListener('click', () => {
      clearCart();
    });

    // =====================================================================================
    // LIMPEZA DE INTENT PENDENTE AO INICIAR
    // =====================================================================================
    async function limparIntentPendente() {
      try {
        // Consulta a intent ativa no device via API
        const resp = await fetch(`/api/mp-point-active-intent`);
        if (!resp.ok) return;
        const data = await resp.json().catch(() => null);
        if (!data?.id) return;
        const state = String(data?.state || '').toLowerCase();
        if (isTerminalSuccessState(state) || isTerminalFailureState(state)) return;
        // Tenta cancelar silenciosamente
        await postJSON(API_MP_CANCEL, { payment_intent_id: data.id }).catch(() => {});
        console.log('[startup] Intent pendente cancelada:', data.id);
      } catch (_) {}
    }

    // =====================================================================================
    // TIMER DE INATIVIDADE — limpa carrinho após 3 minutos sem interação
    // =====================================================================================
    const INATIVIDADE_MS = 2 * 60 * 1000; // 2 minutos
    let inatividadeTimer = null;

    function resetInatividadeTimer() {
      clearTimeout(inatividadeTimer);
      if (cart.size === 0) return; // só monitora se tiver itens
      inatividadeTimer = setTimeout(() => {
        if (cart.size > 0 && !checkoutBusy) {
          clearCart();
          toast('🛒 Carrinho limpo por inatividade.');
        }
      }, INATIVIDADE_MS);
    }

    // Reinicia o timer em qualquer interação do usuário
    ['click', 'touchstart', 'keydown', 'scroll'].forEach(evt => {
      document.addEventListener(evt, resetInatividadeTimer, { passive: true });
    });

    window.addEventListener('load', async () => {
      await limparIntentPendente();
      await loadProducts();
      renderCart();
      setScannerReady();
    });
  </script>
